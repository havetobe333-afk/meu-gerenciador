<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Portal Corporativo - Intranet</title>
    
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20,400,0,0" />
    
    <style>
        :root {
            --md-primary: #1e3a8a; 
            --md-on-primary: #ffffff;
            --md-primary-container: #1e40af; 
            --md-on-primary-container: #ffffff;
            --md-surface: #ffffff; 
            --md-surface-variant: #e2e8f0; 
            --md-on-surface: #0f172a; 
            --md-on-surface-variant: #334155; 
            --md-outline: #cbd5e1; 
            --md-surface-container: #f8fafc; 
            --md-surface-container-high: #e2e8f0;
            --success-color: #166534;
            --error-color: #991b1b;
            --error-container: #fee2e2;
            --on-error-container: #7f1d1d;
            --attention-border-color: #d97706; 
            --shadow-1: 0px 1px 3px rgba(0, 0, 0, 0.05);
            --shadow-2: 0px 4px 12px rgba(0, 0, 0, 0.12);
        }
        
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Roboto', system-ui, -apple-system, sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: var(--md-surface); color: var(--md-on-surface); min-height: 100vh; display: flex; flex-direction: column; }
        
        #app-container { width: 100%; max-width: 600px; margin: 0 auto; padding-bottom: 120px; position: relative; }
        
        .md-icon {
            font-family: 'Material Symbols Outlined';
            font-weight: normal;
            font-style: normal;
            font-size: 16px;
            line-height: 1;
            letter-spacing: normal;
            text-transform: none;
            display: inline-block;
            white-space: nowrap;
            word-wrap: normal;
            direction: ltr;
            -webkit-font-smoothing: antialiased;
            user-select: none;
        }

        header { background: #f1f5f9; padding: 12px 16px; border-bottom: 1px solid var(--md-surface-variant); position: sticky; top: 0; z-index: 100; display: flex; flex-direction: column; gap: 8px; }
        .header-top, .header-left, .sync-status { display: flex; align-items: center; justify-content: space-between; gap: 8px; }
        .header-left { justify-content: flex-start; }
        .app-title { font-size: 20px; font-weight: 600; color: var(--md-on-surface); display: flex; align-items: center; gap: 8px; }
        
        .sync-status { font-size: 11px; color: var(--md-on-surface-variant); font-weight: 600; cursor: pointer; user-select: none; padding: 4px 6px; border-radius: 6px; transition: background-color 0.15s; }
        .sync-status:active { background: var(--md-surface-variant); opacity: 0.8; }
        .status-dot { width: 6px; height: 6px; background: var(--success-color); border-radius: 50%; }
        .progress-container { width: 100%; background: var(--md-surface-variant); height: 3px; border-radius: 1.5px; overflow: hidden; }
        .progress-bar { width: 0%; height: 100%; background: var(--md-primary); transition: width 0.3s; }
        
        .app-tabs { display: flex; background: #f1f5f9; border-bottom: 1px solid var(--md-surface-variant); }
        .tab-btn { flex: 1; background: none; border: none; padding: 14px 0; font-size: 14px; font-weight: 700; color: var(--md-on-surface-variant); cursor: pointer; position: relative; text-align: center; text-transform: uppercase; letter-spacing: 0.5px; }
        .tab-btn.active { color: var(--md-primary); }
        .tab-btn.active::after { content: ''; position: absolute; bottom: 0; left: 25%; width: 50%; height: 3px; background: var(--md-primary); border-radius: 3px 3px 0 0; }

        .date-filters { display: flex; gap: 8px; padding: 12px 16px; background: var(--md-surface); align-items: center; }
        .filter-btn { background: var(--md-surface); border: 1px solid var(--md-outline); width: 40px; height: 40px; border-radius: 10px; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: all 0.2s; color: var(--md-on-surface-variant); flex-shrink: 0; outline: none; }
        .filter-btn .md-icon { font-size: 22px; }
        
        .filter-btn.active { 
            background: var(--md-primary) !important; 
            color: var(--md-on-primary) !important; 
            border: 1px solid var(--md-primary) !important; 
            outline: none !important;
        }
        
        .task-list { padding: 4px 16px; display: flex; flex-direction: column; gap: 14px; }
        
        .project-group-card { 
            background: var(--md-surface-container); 
            border-radius: 14px; 
            padding: 4px 0 0 0; 
            display: flex; 
            flex-direction: column; 
            box-shadow: var(--shadow-1); 
            border: 1px solid var(--md-surface-variant); 
            overflow: hidden;
            margin-bottom: 12px;
        }
        
        .project-group-card.is-fixed { border-color: var(--md-primary); border-width: 1.5px; }
        
        .project-group-header { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            font-size: 12px; 
            font-weight: 700; 
            text-transform: uppercase; 
            color: var(--md-primary); 
            letter-spacing: 0.5px; 
            padding: 10px 14px 6px 14px;
        }
        
        .project-group-count { font-weight: 700; color: var(--md-on-surface-variant); font-size: 11px; background: var(--md-surface-container-high); padding: 1px 6px; border-radius: 8px; }
        
        .btn-project-pin { background: none; border: none; color: var(--md-outline); cursor: pointer; padding: 4px; border-radius: 50%; display: flex; align-items: center; justify-content: center; }
        .btn-project-pin.active { color: var(--md-primary); }

        .task-item { 
            background: transparent; 
            border: none; 
            padding: 12px 14px; 
            display: flex; 
            align-items: center; 
            gap: 12px; 
            transition: background-color 0.2s, opacity 0.2s; 
            position: relative; 
        }
        
        .task-item:not(:last-child) { border-bottom: 1px solid #e2e8f0; }
        .task-item.overdue { background: #fff5f5; }
        .task-item.overdue .task-text { color: #991b1b; }

        .task-item.has-attention {
            border: 3px dashed var(--attention-border-color) !important;
            margin: 4px 6px;
            border-radius: 8px;
            background: #fffbeb;
        }
        .task-item.has-attention.completed {
            border: 2px dashed var(--md-outline) !important;
            background: transparent;
        }

        .drag-handle { color: var(--md-outline); display: flex; align-items: center; justify-content: center; padding: 4px 0; user-select: none; }
        
        .task-checkbox { appearance: none; -webkit-appearance: none; width: 18px; height: 18px; border: 2px solid #cbd5e1; border-radius: 5px; cursor: pointer; flex-shrink: 0; display: inline-flex; align-items: center; justify-content: center; background: #ffffff; }
        .task-checkbox:checked { background: var(--md-primary); border-color: var(--md-primary); }
        .task-checkbox:checked::after { content: "✓"; color: var(--md-on-primary); font-size: 11px; font-weight: bold; }
        
        .task-content { flex-grow: 1; display: flex; justify-content: space-between; align-items: center; gap: 12px; overflow: hidden; }
        .task-text-row { display: flex; align-items: center; gap: 6px; flex-grow: 1; overflow: hidden; flex-wrap: wrap; }
        .task-text { font-size: 14.5px; font-weight: 500; line-height: 1.4; word-break: break-word; cursor: pointer; color: var(--md-on-surface); }
        .task-item.completed .task-text { text-decoration: line-through; color: var(--md-outline) !important; opacity: 0.6; font-weight: 400; }
        
        .inline-tag-badge { font-size: 9px; padding: 1px 5px; border-radius: 4px; font-weight: 700; text-transform: uppercase; color: white; }
        .inline-project-badge { font-size: 9px; padding: 1px 5px; border-radius: 4px; font-weight: 700; text-transform: uppercase; background: #f1f5f9; color: var(--md-primary); border: 1px solid var(--md-outline); }

        .right-date-pilling-zone { display: inline-flex; align-items: center; gap: 4px; color: var(--md-on-surface-variant); font-size: 13px; font-weight: 500; white-space: nowrap; flex-shrink: 0; cursor: pointer; }

        .fab-add-btn {
            position: fixed; bottom: 24px; left: calc(50% + 300px - 80px); width: 56px; height: 56px;
            background: var(--md-primary-container); color: var(--md-on-primary-container); border: none; border-radius: 16px;
            box-shadow: var(--shadow-2); display: flex; align-items: center; justify-content: center; cursor: pointer; z-index: 400;
        }
        .fab-add-btn .md-icon { font-size: 24px; font-weight: bold; }
        
        .input-container { 
            position: fixed; top: 0; left: 50%; width: 100%; max-width: 600px; height: 100vh;
            background: var(--md-surface); padding: 20px; display: flex; flex-direction: column; gap: 12px; z-index: 2000;
            transform: translate(-50%, 100%); transition: transform 0.28s cubic-bezier(0.2, 0.8, 0.3, 1);
            border-left: 1px solid var(--md-surface-variant); border-right: 1px solid var(--md-surface-variant); overflow-y: auto;
        }
        .input-container.visible { transform: translate(-50%, 0); }
        
        .meta-selectors-row { display: flex; flex-direction: column; gap: 8px; width: 100%; }
        
        .selector-row-item {
            display: flex; align-items: center; gap: 12px; background: #f1f5f9; padding: 10px 14px;
            border-radius: 12px; border: 1px solid var(--md-surface-variant); cursor: pointer;
        }

        .selector-btn-icon { width: 32px; height: 32px; display: inline-flex; align-items: center; justify-content: center; color: var(--md-on-surface-variant); }
        .selector-btn-icon .md-icon { font-size: 20px; }
        .selector-row-label { font-size: 14px; font-weight: 600; color: var(--md-on-surface); flex-grow: 1; }

        .meta-badge-text { font-size: 12px; font-weight: 700; color: var(--md-primary); background: #eff6ff; padding: 4px 10px; border-radius: 8px; border: 1px solid #bfdbfe; max-width: 150px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        
        .switch-container { position: relative; display: inline-block; width: 44px; height: 24px; }
        .switch-container input { opacity: 0; width: 0; height: 0; }
        .slider-switch { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #cbd5e1; transition: .2s; border-radius: 24px; }
        .slider-switch:before { position: absolute; content: ""; height: 18px; width: 18px; left: 3px; bottom: 3px; background-color: white; transition: .2s; border-radius: 50%; }
        input:checked + .slider-switch { background-color: var(--attention-border-color); }
        input:checked + .slider-switch:before { transform: translateX(20px); }

        .btn-meta-delete { border: 1px solid var(--error-color); background: #fef2f2; width: 100%; height: 44px; border-radius: 12px; display: none; align-items: center; justify-content: center; gap: 8px; font-size: 14px; font-weight: 700; color: var(--error-color); cursor: pointer; margin-top: 4px; }

        .task-input { width: 100%; height: 90px; border: 1px solid var(--md-surface-variant); background: #f1f5f9; padding: 14px; border-radius: 12px; font-size: 15px; color: var(--md-on-surface); outline: none; resize: none; font-weight: 500; }
        
        .datepicker-wrapper { position: relative; display: inline-flex; align-items: center; }
        .datepicker-text { font-size: 12px; color: var(--md-primary); font-weight: 700; background: #eff6ff; padding: 4px 10px; border-radius: 8px; border: 1px solid #bfdbfe; }

        .blue-add-action-btn { background: var(--md-primary); color: var(--md-on-primary); border: none; width: 40px; height: 40px; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; flex-shrink: 0; }
        
        .drawer-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.4); z-index: 3000; display: none; }
        .drawer { position: fixed; bottom: 0; left: 50%; width: 100%; max-width: 600px; background: #f1f5f9; border-radius: 16px 16px 0 0; padding: 12px 14px; z-index: 3001; transform: translate(-50%, 100%); transition: transform 0.25s cubic-bezier(0.2, 0.8, 0.4, 1); box-shadow: var(--shadow-2); border-top: 1px solid #cbd5e1; }
        .drawer.open { transform: translate(-50%, 0); }
        .drawer-handle { width: 28px; height: 4px; background: #94a3b8; opacity: 0.5; border-radius: 2px; margin: 0 auto 10px auto; }
        .drawer-title { font-size: 13px; font-weight: 700; margin-bottom: 8px; text-align: center; color: var(--md-on-surface); text-transform: uppercase; letter-spacing: 0.3px; }
        
        .items-list-scroll { max-height: 280px; overflow-y: auto; display: flex; flex-direction: column; gap: 4px; }
        .list-item-row { display: flex; justify-content: space-between; align-items: center; padding: 12px 14px; border: 1px solid var(--md-surface-variant); border-radius: 12px; background: var(--md-surface); font-size: 14px; }
        .item-label { display: flex; align-items: center; gap: 8px; cursor: pointer; flex-grow: 1; color: var(--md-on-surface); font-weight: 600; }

        .drawer-radio-input { appearance: none; -webkit-appearance: none; width: 20px; height: 20px; border: 2px solid #cbd5e1; border-radius: 50%; cursor: pointer; display: inline-flex; align-items: center; justify-content: center; }
        .drawer-radio-input:checked { border-color: var(--md-primary); }
        .drawer-radio-input:checked::after { content: ''; width: 10px; height: 10px; background-color: var(--md-primary); border-radius: 50%; display: block; }

        .calendar-popup-overlay { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(0, 0, 0, 0.5); z-index: 5000; display: none; align-items: center; justify-content: center; padding: 20px; }
        .calendar-popup { background: var(--md-surface); border-radius: 16px; width: 100%; max-width: 320px; box-shadow: var(--shadow-2); overflow: hidden; display: flex; flex-direction: column; }
        .calendar-popup-header { background: var(--md-primary); color: var(--md-on-primary); padding: 16px; }
        .calendar-popup-full-date { font-size: 20px; font-weight: 700; }
        .calendar-popup-body { padding: 12px; display: flex; flex-direction: column; gap: 8px; }
        .calendar-nav-row { display: flex; align-items: center; justify-content: space-between; padding: 0 4px; }
        .calendar-nav-title { font-size: 14px; font-weight: 700; color: var(--md-on-surface); }
        .calendar-nav-btn { background: none; border: none; width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; }
        
        .calendar-grid-weekdays, .calendar-grid-days { display: grid; grid-template-columns: repeat(7, 1fr); text-align: center; }
        .calendar-weekday { font-size: 11px; font-weight: 700; color: #94a3b8; padding: 6px 0; }
        .calendar-day-cell { font-size: 13px; font-weight: 600; height: 36px; display: flex; align-items: center; justify-content: center; cursor: pointer; border-radius: 50%; color: var(--md-on-surface); position: relative; margin: 1px; user-select: none; }
        .calendar-day-cell.selected { background: var(--md-primary) !important; color: var(--md-on-primary) !important; }
        
        .calendar-popup-actions { display: flex; justify-content: space-between; align-items: center; padding: 8px 12px 12px 12px; border-top: 1px solid var(--md-surface-variant); background: #f8fafc; }
        .calendar-action-btn { background: none; border: none; padding: 8px 12px; font-size: 13px; font-weight: 700; color: var(--md-primary); cursor: pointer; border-radius: 6px; }
        .calendar-action-btn.btn-clear-date { color: var(--error-color); }

        @media screen and (max-width: 640px) {
            .fab-add-btn { left: auto; right: 24px; }
            .input-container { border-left: none; border-right: none; }
        }
    </style>
</head>
<body>

    <div id="app-container">
        <header>
            <div class="header-top">
                <div class="header-left">
                    <div class="app-title" id="current-view-title"><span class="md-icon" style="font-size:22px;">today</span> Hoje</div>
                </div>
                <div class="sync-status" onclick="triggerManualSync();">
                    <div class="status-dot" id="status-dot"></div>
                    <span id="status-text">Carregando...</span>
                </div>
            </div>
            <div class="progress-container"><div class="progress-bar" id="progress-bar"></div></div>
        </header>

        <div class="app-tabs">
            <button class="tab-btn active" id="tab-tarefas" onclick="switchMainTab('tarefas')">Tarefas</button>
            <button class="tab-btn" id="tab-projetos" onclick="switchMainTab('projetos')">Projetos</button>
        </div>

        <div class="date-filters">
            <button class="filter-btn active" id="f-btn-hoje" onclick="setFilter('hoje')"><span class="md-icon">today</span></button>
            <button class="filter-btn" id="f-btn-amanha" onclick="setFilter('amanha')"><span class="md-icon">next_week</span></button>
            <button class="filter-btn" id="f-btn-todos" onclick="setFilter('todos')"><span class="md-icon">all_inbox</span></button>
            <button class="filter-btn" id="f-btn-completas" onclick="setFilter('completas')"><span class="md-icon">done_all</span></button>
        </div>

        <main class="task-list" id="task-list-container"></main>

        <button class="fab-add-btn" id="fab-trigger" onclick="toggleInputPanel(true)"><span class="md-icon">add</span></button>

        <div class="input-container" id="bottom-input-panel">
            <div style="display: flex; align-items: center; justify-content: space-between; padding-bottom: 4px;">
                <button onclick="toggleInputPanel(false)" style="background: none; border: none; color: var(--md-on-surface-variant); display: flex; align-items: center;"><span class="md-icon" style="font-size: 24px;">close</span></button>
                <div id="layer-title" style="font-size: 16px; font-weight: 700; color: var(--md-on-surface);">Nova Atividade</div>
                <button class="blue-add-action-btn" id="main-action-trigger-btn" onclick="triggerSubmitTask()"><span class="md-icon">check</span></button>
            </div>
            
            <textarea class="task-input" id="new-task-input" placeholder="O que precisa ser feito?" onkeypress="handleInputKey(event)"></textarea>
            
            <div style="font-size: 11px; font-weight: 700; color: #94a3b8; text-transform: uppercase; letter-spacing: 0.5px; margin-top: 4px;">Configurações</div>

            <div class="meta-selectors-row">
                <div class="selector-row-item" onclick="event.stopPropagation()">
                    <div class="selector-btn-icon" style="color: var(--attention-border-color);"><span class="md-icon">priority_high</span></div>
                    <div class="selector-row-label" style="font-weight: 700;">ATENÇÃO (Destacar Item)</div>
                    <div class="attention-toggle-wrapper">
                        <label class="switch-container">
                            <input type="checkbox" id="meta-attention-checkbox">
                            <span class="slider-switch"></span>
                        </label>
                    </div>
                </div>

                <div class="selector-row-item" onclick="openCalendarPopup('layer')">
                    <div class="selector-btn-icon"><span class="md-icon">calendar_today</span></div>
                    <div class="selector-row-label">Data Limite</div>
                    <div class="datepicker-wrapper"><span class="datepicker-text" id="meta-date-text">Hoje</span></div>
                </div>

                <div class="selector-row-item" onclick="openContextDrawer('projetos')">
                    <div class="selector-btn-icon" id="meta-project-btn"><span class="md-icon">folder</span></div>
                    <div class="selector-row-label">Projeto</div>
                    <div class="meta-badge-text" id="badge-project-text">Nenhum</div>
                </div>

                <div class="selector-row-item" onclick="openContextDrawer('tags')">
                    <div class="selector-btn-icon" id="meta-tag-btn"><span class="md-icon">label</span></div>
                    <div class="selector-row-label">Etiqueta / Tag</div>
                    <div class="meta-badge-text" id="badge-tag-text">Nenhuma</div>
                </div>
            </div>
            
            <button class="btn-meta-delete" id="meta-delete-btn" onclick="triggerDeleteSelectedTask()"><span class="md-icon">delete</span> Excluir esta Atividade</button>
        </div>
    </div>

    <div class="drawer-overlay" id="drawer-overlay" onclick="closeDrawer()"></div>
    <div class="drawer" id="context-drawer">
        <div class="drawer-handle"></div>
        <div class="drawer-title" id="drawer-title">Contexto</div>
        <div class="drawer-list-items items-list-scroll" id="drawer-list-items"></div>
    </div>

    <div class="calendar-popup-overlay" id="calendar-popup-overlay" onclick="closeCalendarPopup()">
        <div class="calendar-popup" id="calendar-popup-box" onclick="event.stopPropagation()">
            <div class="calendar-popup-header">
                <div class="calendar-popup-full-date" id="cal-header-fulldate">Data</div>
            </div>
            <div class="calendar-popup-body">
                <div class="calendar-nav-row">
                    <div class="calendar-nav-title" id="cal-nav-title">Mês Atual</div>
                </div>
                <div class="calendar-grid-weekdays">
                    <div class="calendar-weekday">D</div><div class="calendar-weekday">S</div><div class="calendar-weekday">T</div>
                    <div class="calendar-weekday">Q</div><div class="calendar-weekday">Q</div><div class="calendar-weekday">S</div>
                    <div class="calendar-weekday">S</div>
                </div>
                <div class="calendar-grid-days" id="calendar-days-grid"></div>
            </div>
            <div class="calendar-popup-actions">
                <button class="calendar-action-btn btn-clear-date" onclick="clearCalendarSelection()">Sem Data</button>
                <button class="calendar-action-btn" onclick="closeCalendarPopup()">Cancelar</button>
            </div>
        </div>
    </div>

    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js').catch(err => console.log(err));
            });
        }

        const BIN_ID = '6937666aae596e708f8c6683', API_KEY = '$2a$10$V0UFHZ8bHEdDdwGEpXjEYeR1.ZL9oIiMUY//5YbHFHc7yjai/WHpy';
        const JSONBIN_URL = `https://api.jsonbin.io/v3/b/${BIN_ID}`;
        const $ = id => document.getElementById(id);

        let state = {
            tasks: [], 
            projetos: [
                { nome: "Trabalho", deleted: false, fixed: false },
                { nome: "Pessoal", deleted: false, fixed: false },
                { nome: "Estudos", deleted: false, fixed: false }
            ], 
            tags: [
                { nome: "Urgente", cor: "#b91c1c", deleted: false },
                { nome: "Fácil", cor: "#16a34a", deleted: false },
                { nome: "Aguardando", cor: "#ea580c", deleted: false }
            ],
            filterType: 'hoje', selectedFilterValue: '', tempDate: '', tempProject: 'No project', tempTag: '', tempAttention: false, activeTaskId: null, currentTab: 'tarefas'
        };

        let calCurrentViewDate = new Date(), calSelectedDateStr = '', calTargetMode = 'layer', calTargetTaskId = null, isSyncingCurrently = false;

        const getISOStringLocal = (d) => `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`;

        function getFriendlyDateText(dateStr) {
            if (!dateStr || dateStr.trim() === '') return 'Sem data';
            const hoje = getISOStringLocal(new Date());
            if (dateStr === hoje) return 'Hoje';
            const partes = dateStr.split('-');
            return `${partes[2]}/${partes[1]}`;
        }

        function setSyncStatus(text, color) {
            if ($('status-text')) $('status-text').innerText = text;
            if ($('status-dot')) $('status-dot').style.backgroundColor = color;
        }

        function toggleInputPanel(show) {
            const panel = $('bottom-input-panel'), fab = $('fab-trigger');
            if(show) {
                $('layer-title').innerText = state.activeTaskId ? "Editar Atividade" : "Nova Atividade";
                panel.classList.add('visible'); fab.style.display = 'none'; $('new-task-input').focus();
            } else {
                panel.classList.remove('visible'); fab.style.display = 'flex'; state.activeTaskId = null;
                state.tempProject = 'No project'; state.tempTag = ''; state.tempAttention = false;
                updateBarMetaUi();
            }
        }

        function switchMainTab(tabName) {
            state.currentTab = tabName;
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            $(`tab-${tabName}`).classList.add('active');
            render();
        }

        function loadLocalStorage() {
            const t = localStorage.getItem('local_fallback_tasks'), p = localStorage.getItem('local_fallback_proj'), g = localStorage.getItem('local_fallback_tags');
            if(t) state.tasks = JSON.parse(t);
            if(p) state.projetos = JSON.parse(p);
            if(g) state.tags = JSON.parse(g);
        }

        function saveLocalStorage() {
            localStorage.setItem('local_fallback_tasks', JSON.stringify(state.tasks));
            localStorage.setItem('local_fallback_proj', JSON.stringify(state.projetos));
            localStorage.setItem('local_fallback_tags', JSON.stringify(state.tags));
        }

        function initApp() {
            state.tempDate = getISOStringLocal(new Date()); updateSelectedDate(state.tempDate);
            loadLocalStorage(); render(); syncWithServer();
            window.addEventListener('online', () => syncWithServer());
            window.addEventListener('offline', () => setSyncStatus('Modo Offline', '#ba1a1a'));
            setInterval(() => { if (navigator.onLine && !isSyncingCurrently) syncWithServer(); }, 20000);
        }

        function mergeIncomingData(serverData) {
            if (!serverData) return false;
            let changed = false;

            const tMap = new Map(); state.tasks.forEach(t => tMap.set(t.id, t));
            if (Array.isArray(serverData.tasks)) {
                serverData.tasks.forEach(st => {
                    if (!tMap.has(st.id)) { tMap.set(st.id, st); changed = true; } 
                    else {
                        const local = tMap.get(st.id);
                        if (st.deleted && !local.deleted) { local.deleted = true; local.deletedAt = st.deletedAt || Date.now(); changed = true; }
                        else if (!local.deleted && st.updatedAt > (local.updatedAt || 0)) {
                            Object.assign(local, { text: st.text, completed: st.completed, date: st.date, project: st.project, tag: st.tag, attention: !!st.attention, updatedAt: st.updatedAt });
                            changed = true;
                        }
                    }
                });
            }
            state.tasks = Array.from(tMap.values());
            if (changed) saveLocalStorage();
            return changed;
        }

        async function syncWithServer() {
            if (!navigator.onLine) { setSyncStatus('Modo Offline', '#ba1a1a'); return; }
            if (isSyncingCurrently) return;
            isSyncingCurrently = true; setSyncStatus('Sincronizando...', '#eab308');

            try {
                const headers = { 'X-Master-Key': API_KEY, 'X-Bin-Meta': 'false' };
                const controller = new AbortController();
                const timeout = setTimeout(() => controller.abort(), 4000);

                const resGet = await fetch(JSONBIN_URL, { method: 'GET', headers, signal: controller.signal });
                clearTimeout(timeout);

                if (resGet.ok) {
                    const serverRes = await resGet.json();
                    if (mergeIncomingData(serverRes)) render();
                }

                const resPut = await fetch(JSONBIN_URL, {
                    method: 'PUT',
                    headers: { ...headers, 'Content-Type': 'application/json' },
                    body: JSON.stringify({ tasks: state.tasks, projetos: state.projetos, tags: state.tags })
                });
                
                if (resPut.ok) setSyncStatus('Sincronizado', '#15803d');
                else throw new Error();
            } catch(e) {
                setSyncStatus('Modo Offline', '#ba1a1a');
            } finally { isSyncingCurrently = false; }
        }

        function triggerManualSync() { syncWithServer(); }

        function updateSelectedDate(val) { state.tempDate = val || ''; if ($('meta-date-text')) $('meta-date-text').innerText = getFriendlyDateText(val); }

        function setFilter(type, value = '') {
            state.filterType = type; state.selectedFilterValue = value;
            document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
            if(['hoje', 'amanha', 'todos', 'completas'].includes(type)) $(`f-btn-${type}`).classList.add('active');
            render();
        }

        function handleInputKey(e) { if(e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); triggerSubmitTask(); } }

        function updateBarMetaUi() {
            $('badge-project-text').innerText = state.tempProject !== 'No project' ? state.tempProject : 'Nenhum';
            $('badge-tag-text').innerText = state.tempTag || 'Nenhuma';
            $('meta-attention-checkbox').checked = !!state.tempAttention;
            $('meta-delete-btn').style.display = state.activeTaskId ? 'flex' : 'none';
        }

        function triggerSubmitTask() {
            const input = $('new-task-input'), val = input.value.trim(), att = $('meta-attention-checkbox').checked;
            if(val) {
                if (state.activeTaskId) {
                    const t = state.tasks.find(x => x.id === state.activeTaskId);
                    if (t) Object.assign(t, { text: val, date: state.tempDate, project: state.tempProject, tag: state.tempTag, attention: att, updatedAt: Date.now() });
                } else {
                    state.tasks.push({ id: 't_' + Date.now(), text: val, completed: false, date: state.tempDate, project: state.tempProject, tag: state.tempTag, attention: att, deleted: false, updatedAt: Date.now() });
                }
                input.value = ''; state.tempProject = 'No project'; state.tempTag = ''; state.tempAttention = false; state.activeTaskId = null;
                updateBarMetaUi(); toggleInputPanel(false); saveLocalStorage(); render(); syncWithServer();
            }
        }

        function triggerDeleteSelectedTask() { if (state.activeTaskId) { opTask(state.activeTaskId, 'delete'); toggleInputPanel(false); } }

        function callTaskBackToDraft(id) {
            const t = state.tasks.find(x => x.id === id); if(!t || t.completed) return;
            state.activeTaskId = t.id; $('new-task-input').value = t.text; state.tempDate = t.date || ''; state.tempProject = t.project || 'No project'; state.tempTag = t.tag || ''; state.tempAttention = !!t.attention;
            updateBarMetaUi(); updateSelectedDate(t.date); toggleInputPanel(true);
        }

        function opTask(id, type, val = '') {
            const t = state.tasks.find(x => x.id === id); if(!t) return;
            if (type === 'toggle') { t.completed = !t.completed; t.updatedAt = Date.now(); }
            if (type === 'change-date') { t.date = val; t.updatedAt = Date.now(); }
            if (type === 'delete') { t.deleted = true; t.deletedAt = Date.now(); }
            saveLocalStorage(); render(); syncWithServer();
        }

        function createHTMLTaskItem(t, hojeIso) {
            const item = document.createElement('div');
            item.className = `task-item ${t.completed ? 'completed' : ''} ${t.date && t.date < hojeIso && !t.completed ? 'overdue' : ''} ${t.attention ? 'has-attention' : ''}`;
            
            // Procura a cor da Tag correspondente
            const tagObj = state.tags.find(g => g.nome === t.tag && !g.deleted);
            const tagColor = tagObj ? tagObj.cor : '#4f46e5';

            item.innerHTML = `
                <div class="drag-handle"><span class="md-icon" style="font-size:18px;">drag_indicator</span></div>
                <input type="checkbox" class="task-checkbox" ${t.completed ? 'checked' : ''} onchange="opTask('${t.id}', 'toggle')">
                <div class="task-content">
                    <div class="task-text-row">
                        <span class="task-text" onclick="${t.completed ? '' : `callTaskBackToDraft('${t.id}')`}">${t.text}</span>
                        ${t.project && t.project !== 'No project' ? `<span class="inline-project-badge">${t.project}</span>` : ''}
                        ${t.tag ? `<span class="inline-tag-badge" style="background: ${tagColor}">${t.tag}</span>` : ''}
                    </div>
                    <span class="right-date-pilling-zone" onclick="event.stopPropagation(); openCalendarPopup('inline', '${t.id}')">
                        <span>${getFriendlyDateText(t.date)}</span><span class="right-date-icon"><span class="md-icon">calendar_today</span></span>
                    </span>
                </div>
            `;
            return item;
        }

        function render() {
            if (state.currentTab === 'projetos') {
                renderProjetsTab();
                return;
            }

            const container = $('task-list-container'); container.innerHTML = '';
            let active = state.tasks.filter(t => !t.deleted), hojeIso = getISOStringLocal(new Date());
            
            let filtered = active.filter(t => {
                if (state.filterType === 'completas') return t.completed; if (t.completed) return false;
                return state.filterType === 'hoje' ? t.date === hojeIso : state.filterType === 'amanha' ? t.date === getISOStringLocal(new Date(Date.now() + 86400000)) : true;
            });

            if(!filtered.length) { container.innerHTML = `<div style="text-align:center;color:#94a3b8;padding:30px 0;font-size:13px;">Nenhuma atividade pendente.</div>`; return; }

            const box = document.createElement('div'); box.style.background = '#fff'; box.style.borderRadius = '14px'; box.style.border = '1px solid #e2e8f0';
            filtered.forEach(t => box.appendChild(createHTMLTaskItem(t, hojeIso)));
            container.appendChild(box);
            
            const tot = active.length, don = active.filter(t => t.completed).length;
            $('progress-bar').style.width = `${tot ? (don / tot) * 100 : 0}%`;
        }

        function renderProjetsTab() {
            const container = $('task-list-container'); container.innerHTML = '';
            state.projetos.filter(p => !p.deleted).forEach(p => {
                const count = state.tasks.filter(t => t.project === p.nome && !t.completed && !t.deleted).length;
                const card = document.createElement('div');
                card.className = 'project-group-card';
                card.innerHTML = `
                    <div class="project-group-header">
                        <span class="project-group-title-link">${p.nome} <span class="project-group-count">${count}</span></span>
                    </div>
                `;
                container.appendChild(card);
            });
        }

        function openDrawerCommon(title, listFn) { 
            $('drawer-overlay').style.display = 'block'; 
            $('context-drawer').classList.add('open'); 
            $('drawer-title').innerText = title; 
            listFn(); 
        }
        
        const closeDrawer = () => { 
            $('context-drawer').classList.remove('open'); 
            $('drawer-overlay').style.display = 'none'; 
        };

        function openContextDrawer(mode) {
            if(mode === 'projetos') {
                openDrawerCommon("Selecionar Projeto", () => {
                    const listCont = $('drawer-list-items'); listCont.innerHTML = '';
                    
                    // Opção Padrão (Sem Projeto)
                    const rowNone = document.createElement('div'); rowNone.className = 'list-item-row';
                    rowNone.innerHTML = `
                        <label class="item-label" onclick="selectProjectFromDrawer('No project')">
                            <span class="md-icon">folder_off</span> Nenhum Projeto
                        </label>
                        <input type="radio" class="drawer-radio-input" name="proj-r" ${state.tempProject === 'No project' ? 'checked' : ''}>
                    `;
                    listCont.appendChild(rowNone);

                    // Lista de Projetos Ativos
                    state.projetos.filter(p => !p.deleted).forEach(p => {
                        const row = document.createElement('div'); row.className = 'list-item-row';
                        row.innerHTML = `
                            <label class="item-label" onclick="selectProjectFromDrawer('${p.nome}')">
                                <span class="md-icon">folder</span> ${p.nome}
                            </label>
                            <input type="radio" class="drawer-radio-input" name="proj-r" ${state.tempProject === p.nome ? 'checked' : ''}>
                        `;
                        listCont.appendChild(row);
                    });
                });
            }
            if(mode === 'tags') {
                openDrawerCommon("Selecionar Etiqueta / Tag", () => {
                    const listCont = $('drawer-list-items'); listCont.innerHTML = '';
                    
                    // Opção Padrão (Sem Tag)
                    const rowNone = document.createElement('div'); rowNone.className = 'list-item-row';
                    rowNone.innerHTML = `
                        <label class="item-label" onclick="selectTagFromDrawer('')">
                            <span class="md-icon">label_off</span> Nenhuma Tag
                        </label>
                        <input type="radio" class="drawer-radio-input" name="tag-r" ${state.tempTag === '' ? 'checked' : ''}>
                    `;
                    listCont.appendChild(rowNone);

                    // Lista de Tags Ativas
                    state.tags.filter(g => !g.deleted).forEach(g => {
                        const row = document.createElement('div'); row.className = 'list-item-row';
                        row.innerHTML = `
                            <label class="item-label" onclick="selectTagFromDrawer('${g.nome}')">
                                <span class="md-icon" style="color: ${g.cor}">label</span> ${g.nome}
                            </label>
                            <input type="radio" class="drawer-radio-input" name="tag-r" ${state.tempTag === g.nome ? 'checked' : ''}>
                        `;
                        listCont.appendChild(row);
                    });
                });
            }
        }

        function selectProjectFromDrawer(name) { state.tempProject = name; updateBarMetaUi(); closeDrawer(); }
        function selectTagFromDrawer(name) { state.tempTag = name; updateBarMetaUi(); closeDrawer(); }

        function openCalendarPopup(mode, id = null) { calTargetMode = mode; calTargetTaskId = id; $('calendar-popup-overlay').style.display = 'flex'; buildCalendarGrid(); }
        function closeCalendarPopup() { $('calendar-popup-overlay').style.display = 'none'; }
        
        function clearCalendarSelection() { 
            if(calTargetMode === 'layer') updateSelectedDate(''); 
            else opTask(calTargetTaskId, 'change-date', ''); 
            closeCalendarPopup(); 
        }

        function buildCalendarGrid() {
            const yr = calCurrentViewDate.getFullYear(), ms = calCurrentViewDate.getMonth();
            $('cal-nav-title').innerText = `${ms+1}/${yr}`; const grid = $('calendar-days-grid'); grid.innerHTML = '';
            
            // Renderização simplificada de dias para navegação rápida
            for(let d=1; d<=31; d++) {
                const cell = document.createElement('div'); cell.className = 'calendar-day-cell'; cell.innerText = d;
                const cStr = `${yr}-${String(ms+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
                if(cStr === getISOStringLocal(new Date())) cell.style.border = "1px solid var(--md-primary)";
                
                cell.onclick = () => { 
                    if(calTargetMode === 'layer') updateSelectedDate(cStr); 
                    else opTask(calTargetTaskId, 'change-date', cStr); 
                    closeCalendarPopup(); 
                };
                grid.appendChild(cell);
            }
        }

        window.addEventListener('DOMContentLoaded', initApp);
    </script>
</body>
</html>
